// ── UTILS ─────────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).substr(2,9);
const fmt = n => `$${Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtUSD = n => `US$${Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const todayStr = () => new Date().toISOString().split('T')[0];

// Parsea un string "YYYY-MM-DD" como fecha LOCAL (evita el corrimiento de un día que pasa
// cuando new Date("YYYY-MM-DD") lo interpreta como medianoche UTC y se convierte a horario local)
const parseLocalDate = (dateStr) => {
  if (!dateStr) return new Date();
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, (m||1)-1, d||1);
};
const fmtDate = (dateStr, opts) => parseLocalDate(dateStr).toLocaleDateString('es-AR', opts);

const daysSince = dateStr => {
  if (!dateStr) return null;
  const target = parseLocalDate(dateStr);
  const today = new Date();
  const todayLocal = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  return Math.round((todayLocal - target) / 86400000);
};

// Calcula días restantes hasta el próximo vencimiento de un servicio, dado el día del mes (1-31)
const daysUntilDue = (dueDay) => {
  if (!dueDay) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let target = new Date(now.getFullYear(), now.getMonth(), dueDay);
  if (target < today) target = new Date(now.getFullYear(), now.getMonth()+1, dueDay);
  return Math.round((target - today) / 86400000);
};

};

// ── LENSES VIEW ───────────────────────────────────────────────────────────────
function LensesView({ lenses, setLenses, lensStock, setLensStock, purchases, setPurchases }) {
  const [view, setView] = useState('changes'); // 'changes' | 'purchases'
  const [showForm, setShowForm] = useState(false);
  const [showPurchaseForm, setShowPurchaseForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editingPurchaseId, setEditingPurchaseId] = useState(null);
  const [form, setForm] = useState({ date:todayStr(), brand:'', type:'Mensual', leftEye:'', rightEye:'', notes:'' });
  const [pForm, setPForm] = useState({ date:todayStr(), place:'', price:'', pairs:1 });
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const setPF = (k,v) => setPForm(f=>({...f,[k]:v}));

  const sorted = useMemo(()=>[...lenses].sort((a,b)=>new Date(b.date)-new Date(a.date)),[lenses]);
  const last = sorted[0]??null;
  const sortedPurchases = useMemo(()=>[...purchases].sort((a,b)=>new Date(b.date)-new Date(a.date)),[purchases]);

  const openAdd = () => { setEditingId(null); setForm({date:todayStr(),brand:'',type:'Mensual',leftEye:'',rightEye:'',notes:''}); setShowForm(true); };
  const openEdit = (l) => { setEditingId(l.id); setForm({date:l.date,brand:l.brand||'',type:l.type||'Mensual',leftEye:l.leftEye||'',rightEye:l.rightEye||'',notes:l.notes||''}); setShowForm(true); };

  const handleAdd = e => {
    e.preventDefault();
    if (editingId) {
      setLenses(prev=>prev.map(x=>x.id===editingId?{...form,id:editingId}:x));
    } else {
      setLenses(prev=>[{...form,id:uid()},...prev]);
      setLensStock(s=>Math.max(0,s-1)); // descuenta 1 par de stock solo al crear un cambio nuevo
    }
    setShowForm(false);
    setEditingId(null);
  };
  const del = id => { if(confirm('¿Eliminar registro? (No se devuelve el stock automáticamente)')) setLenses(p=>p.filter(x=>x.id!==id)); };

  const openAddPurchase = () => { setEditingPurchaseId(null); setPForm({date:todayStr(),place:'',price:'',pairs:1}); setShowPurchaseForm(true); };
  const openEditPurchase = (p) => { setEditingPurchaseId(p.id); setPForm({date:p.date,place:p.place||'',price:p.price??'',pairs:p.pairs??1}); setShowPurchaseForm(true); };

  const handleAddPurchase = e => {
    e.preventDefault();
    const pairs = parseInt(pForm.pairs)||1;
    if (editingPurchaseId) {
      setPurchases(prev=>prev.map(x=>x.id===editingPurchaseId?{...pForm,price:pForm.price?parseFloat(pForm.price):null,pairs,id:editingPurchaseId}:x));
    } else {
      setPurchases(prev=>[{...pForm, price:pForm.price?parseFloat(pForm.price):null, pairs, id:uid()},...prev]);
      setLensStock(s=>s+pairs); // suma los pares comprados al stock solo al crear una compra nueva
    }
    setShowPurchaseForm(false);
    setEditingPurchaseId(null);
  };
  const delPurchase = id => {
    if(confirm('¿Eliminar esta compra? (No se descuenta el stock automáticamente)')) setPurchases(p=>p.filter(x=>x.id!==id));
  };

  return h('div',{className:'space-y-5 fade-up'},
    h('div',{className:'rounded-3xl p-6 text-white relative overflow-hidden',style:{background:'linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%)'}},
      h('div',{className:'absolute right-4 top-4 text-6xl opacity-20'},'👁️'),
      h('p',{className:'text-[10px] font-black text-indigo-200 uppercase tracking-widest mb-1'},'Último cambio de lentes'),
      last ? h(Fragment,null,
        h('h2',{className:'text-3xl font-black mb-1'},fmtDate(last.date,{day:'2-digit',month:'long',year:'numeric'})),
        h('p',{className:'text-indigo-200 text-sm font-bold'},[last.brand,last.type].filter(Boolean).join(' · ')),
        h('div',{className:'mt-4 inline-flex items-center gap-2 bg-white/20 rounded-2xl px-4 py-2'},
          h('span',{className:'text-2xl font-black'},daysSince(last.date)),
          h('span',{className:'text-sm font-bold text-indigo-100'},'días desde el último cambio')
        )
      ) : h('p',{className:'text-indigo-200 font-bold'},'Sin registros aún')
    ),
    h('div',{className:'card p-5'},
      h('div',{className:'flex justify-between items-center mb-3'},
        h('p',{className:'text-[10px] font-black text-slate-400 uppercase tracking-widest'},'Stock de pares'),
        h('div',{className:'flex items-center gap-3'},
          h('button',{onClick:()=>setLensStock(s=>Math.max(0,s-1)),className:'w-8 h-8 rounded-xl bg-slate-100 text-slate-600 font-black text-lg hover:bg-rose-100 hover:text-rose-600 transition-colors'},'−'),
          h('span',{className:`text-2xl font-black mono ${lensStock<=2?'text-rose-500':lensStock<=5?'text-amber-500':'text-emerald-600'}`},lensStock),
          h('button',{onClick:()=>setLensStock(s=>s+1),className:'w-8 h-8 rounded-xl bg-slate-100 text-slate-600 font-black text-lg hover:bg-emerald-100 hover:text-emerald-600 transition-colors'},'+')
        )
      ),
      h('div',{className:'flex gap-1'},
        Array.from({length:Math.min(lensStock,20)}).map((_,i)=>h('div',{key:i,className:`h-2 flex-1 rounded-full ${lensStock<=2?'bg-rose-400':lensStock<=5?'bg-amber-400':'bg-emerald-400'}`}))
      ),
      lensStock<=3&&lensStock>0&&h('p',{className:'text-xs text-rose-500 font-bold mt-2 flex items-center gap-1.5'},
        h('span',{className:'ping-slow inline-block w-2 h-2 rounded-full bg-rose-500'}),
        `Quedan solo ${lensStock} pares — ¡pedí más pronto!`
      ),
      lensStock===0&&h('p',{className:'text-xs text-rose-500 font-bold mt-2'},'⚠️ Sin stock')
    ),

    h('div',{className:'grid grid-cols-2 gap-3'},
      h('button',{onClick:openAdd,className:'py-4 rounded-2xl font-black text-xs uppercase tracking-widest bg-violet-600 text-white shadow-lg shadow-violet-200 hover:bg-violet-700 transition-all'},'+ Cambio'),
      h('button',{onClick:openAddPurchase,className:'py-4 rounded-2xl font-black text-xs uppercase tracking-widest bg-emerald-600 text-white shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-all'},'+ Compra')
    ),

    // Sub-tabs: Cambios / Compras
    h('div',{className:'flex gap-2 p-1 bg-white rounded-2xl border border-slate-100'},
      [{id:'changes',icon:'👁️',label:'Cambios'},{id:'purchases',icon:'🛒',label:'Compras'}].map(t=>
        h('button',{key:t.id,onClick:()=>setView(t.id),className:`flex-1 py-2.5 rounded-xl font-black text-xs transition-all flex items-center justify-center gap-2 ${view===t.id?'bg-violet-600 text-white shadow':'text-slate-500 hover:bg-slate-50'}`},t.icon,' ',t.label)
      )
    ),

    view==='changes' && h('div',{className:'space-y-3'},
      h('p',{className:'text-[10px] font-black text-slate-400 uppercase tracking-widest'},'Historial de cambios'),
      sorted.length===0?h('div',{className:'card p-8 text-center text-slate-400'},h('p',{className:'text-3xl mb-2'},'👁️'),h('p',{className:'font-bold text-sm'},'Sin registros')):
      sorted.map((l,i)=>h('div',{key:l.id,className:'card p-4 flex items-center justify-between'},
        h('div',{className:'flex items-center gap-4'},
          h('div',{className:'w-10 h-10 rounded-2xl flex items-center justify-center text-xl',style:{background:'#ede9fe'}},'👁️'),
          h('div',null,
            h('p',{className:'font-black text-slate-800 text-sm'},fmtDate(l.date,{day:'2-digit',month:'short',year:'numeric'})),
            h('p',{className:'text-[11px] text-slate-500 font-bold'},[l.brand,l.type,l.leftEye&&`OI: ${l.leftEye}`,l.rightEye&&`OD: ${l.rightEye}`].filter(Boolean).join(' · ')),
            i===0&&h('span',{className:'section-pill bg-violet-100 text-violet-600 mt-1'},'Último')
          )
        ),
        h('div',{className:'flex gap-1'},
          h('button',{onClick:()=>openEdit(l),className:'p-2 text-slate-300 hover:text-violet-600 hover:bg-violet-50 rounded-xl transition-colors'},'✏️'),
          h('button',{onClick:()=>del(l.id),className:'p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-colors'},'🗑️')
        )
      ))
    ),

    view==='purchases' && h('div',{className:'space-y-3'},
      h('p',{className:'text-[10px] font-black text-slate-400 uppercase tracking-widest'},'Historial de compras'),
      sortedPurchases.length===0?h('div',{className:'card p-8 text-center text-slate-400'},h('p',{className:'text-3xl mb-2'},'🛒'),h('p',{className:'font-bold text-sm'},'Sin compras registradas')):
      sortedPurchases.map(p=>h('div',{key:p.id,className:'card p-4 flex items-center justify-between'},
        h('div',{className:'flex items-center gap-4'},
          h('div',{className:'w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center text-xl'},'🛒'),
          h('div',null,
            h('p',{className:'font-black text-slate-800 text-sm'},fmtDate(p.date,{day:'2-digit',month:'short',year:'numeric'})),
            h('p',{className:'text-[11px] text-slate-500 font-bold'},[p.place,p.price&&fmt(p.price),`${p.pairs} ${p.pairs===1?'par':'pares'}`].filter(Boolean).join(' · '))
          )
        ),
        h('div',{className:'flex gap-1'},
          h('button',{onClick:()=>openEditPurchase(p),className:'p-2 text-slate-300 hover:text-emerald-600 hover:bg-emerald-50 rounded-xl transition-colors'},'✏️'),
          h('button',{onClick:()=>delPurchase(p.id),className:'p-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-colors'},'🗑️')
        )
      ))
    ),

    showForm&&h(Modal,{onClose:()=>{setShowForm(false);setEditingId(null);}},
      h('form',{onSubmit:handleAdd,className:'bg-white rounded-t-3xl md:rounded-3xl p-6 space-y-4'},
        h('div',{className:'flex justify-between items-center'},h('h3',{className:'text-lg font-black'},editingId?'Editar Cambio de Lentes':'Registrar Cambio de Lentes'),h('button',{type:'button',onClick:()=>{setShowForm(false);setEditingId(null);},className:'text-slate-400 text-2xl'},'×')),
        !editingId&&h('p',{className:'text-xs text-violet-600 font-bold bg-violet-50 p-3 rounded-xl'},'📦 Esto va a descontar 1 par del stock automáticamente'),

// Adivina un dominio probable a partir del nombre (servicio o billetera) para buscar su logo
const guessDomain = (name) => {
  if (!name) return null;
  const known = {
    netflix:'netflix.com', spotify:'spotify.com', youtube:'youtube.com', disney:'disneyplus.com',
    hbo:'hbomax.com', max:'max.com', amazon:'amazon.com', prime:'primevideo.com', apple:'apple.com',
    icloud:'apple.com', google:'google.com', drive:'google.com', microsoft:'microsoft.com',
    office:'microsoft.com', xbox:'xbox.com', playstation:'playstation.com', psn:'playstation.com',
    steam:'steampowered.com', nintendo:'nintendo.com', dropbox:'dropbox.com', adobe:'adobe.com',
    canva:'canva.com', notion:'notion.so', slack:'slack.com', zoom:'zoom.us', whatsapp:'whatsapp.com',
    movistar:'movistar.com.ar', personal:'personal.com.ar', claro:'claro.com.ar', directv:'directv.com.ar',
    cablevision:'cablevisionfibertel.com.ar', flow:'flow.com.ar', telecentro:'telecentro.com.ar',
    fibertel:'cablevisionfibertel.com.ar', edesur:'edesur.com.ar', edenor:'edenor.com.ar',
    metrogas:'metrogas.com.ar', aysa:'aysa.com.ar', deezer:'deezer.com',
    crunchyroll:'crunchyroll.com', paramount:'paramountplus.com', star:'starplus.com',
    // Billeteras y bancos argentinos
    galicia:'bancogalicia.com.ar', santander:'santander.com.ar', bbva:'bbva.com.ar',
    macro:'macro.com.ar', nacion:'bna.com.ar', provincia:'bancoprovincia.com.ar',
    hsbc:'hsbc.com.ar', icbc:'icbc.com.ar', supervielle:'supervielle.com.ar', ciudad:'bancociudad.com.ar',
    mercadopago:'mercadopago.com.ar', 'mercado pago':'mercadopago.com.ar', uala:'uala.com.ar',
    brubank:'brubank.com', naranja:'tarjetanaranjax.com', naranjax:'tarjetanaranjax.com',
    personalpay:'personalpay.com.ar', 'cuenta dni':'cuentadni.bcra.gob.ar', dni:'cuentadni.bcra.gob.ar',
    visa:'visa.com.ar', mastercard:'mastercard.com.ar', cabal:'cabal.coop', amex:'americanexpress.com',
    'american express':'americanexpress.com', lemon:'lemon.me', belo:'belo.app', astropay:'astropay.com',
  };
  const lower = name.toLowerCase().trim();
  for (const key in known) { if (lower.includes(key) && known[key]) return known[key]; }
  const cleaned = lower.replace(/[^a-z0-9]/g,'');
  if (!cleaned) return null;
  return `${cleaned}.com`;
};

const BrandLogo = ({ name, size='w-10 h-10', customLogo }) => {
  const [stage, setStage] = useState(0); // 0: google favicon, 1: clearbit fallback, 2: letter fallback
  const domain = guessDomain(name);
  const firstLetter = (name||'?').trim().charAt(0).toUpperCase();

  if (customLogo) {
    return h('div',{className:`${size} rounded-xl bg-white border border-slate-100 flex items-center justify-center overflow-hidden flex-shrink-0`},
      h('img',{src:customLogo, alt:name, className:'w-full h-full object-contain p-1.5'})
    );
  }

  if (!domain || stage >= 2) {
    return h('div',{className:`${size} rounded-xl bg-indigo-50 flex items-center justify-center font-black text-indigo-400 flex-shrink-0`},firstLetter);
  }

  const src = stage === 0
    ? `https://www.google.com/s2/favicons?domain=${domain}&sz=128`
    : `https://logo.clearbit.com/${domain}?size=80`;

  return h('div',{className:`${size} rounded-xl bg-white border border-slate-100 flex items-center justify-center overflow-hidden flex-shrink-0`},
    h('img',{
      src,
      alt:name,
      className:'w-full h-full object-contain p-1.5',
      onError:()=>setStage(s=>s+1)
    })
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const now=new Date();
  const currentY=Math.max(2026,now.getUTCFullYear());
  const currentM=currentY>now.getUTCFullYear()?0:now.getUTCMonth();

  const [authState, setAuthState] = useState('loading'); // 'loading' | 'unauthorized' | 'authenticated'
  const [user, setUser] = useState(null);
  const [authError, setAuthError] = useState('');
  const [dataLoading, setDataLoading] = useState(false);

  const [expenses,  setExpensesRaw]  = useState([]);
  const [wallets,   setWalletsRaw]   = useState(DEFAULT_WALLETS);
  const [services,  setServicesRaw]  = useState([]);
  const [lenses,    setLensesRaw]    = useState([]);
  const [purchases, setPurchasesRaw] = useState([]);
  const [haircuts,  setHaircutsRaw]  = useState([]);
  const [lensStock, setLensStockRaw] = useState(0);
  const [dolarBlue, setDolarBlue]    = useState(1000);
  const [tab,       setTab]          = useState('home');
  const [month,     setMonth]        = useState(currentM);
  const [year,      setYear]         = useState(currentY);
  const categories = DEFAULT_CATS;

  // Save wrapper — auto-saves to Firestore on every change
  const makeSet = (key, setter) => (valOrFn) => {
    setter(prev => {
      const next = typeof valOrFn === 'function' ? valOrFn(prev) : valOrFn;
      if (user) {
        saveData(user.uid, { [key]: next });
      }
      return next;
    });
  };

  const setExpenses  = makeSet('expenses',  setExpensesRaw);
  const setWallets   = makeSet('wallets',   setWalletsRaw);
  const setServices  = makeSet('services',  setServicesRaw);
  const setLenses    = makeSet('lenses',    setLensesRaw);
  const setPurchases = makeSet('purchases', setPurchasesRaw);
  const setHaircuts  = makeSet('haircuts',  setHaircutsRaw);
  const setLensStock = makeSet('lensStock', setLensStockRaw);

  // Auth listener
  useEffect(() => {
    const unsub = onAuthStateChanged(auth, async (firebaseUser) => {
      if (!firebaseUser) { setAuthState('unauthenticated'); setUser(null); return; }
      if (firebaseUser.email !== AUTHORIZED_EMAIL) {
        await signOut(auth);
        setAuthState('unauthenticated');
        setAuthError('⛔ Acceso denegado. Esta app es privada y solo admite el email autorizado.');
        return;
      }
      setUser(firebaseUser);
      setAuthState('authenticated');
      setDataLoading(true);
      // Load data from Firestore
      try {
        const snap = await getDoc(getUserDocRef(firebaseUser.uid));
        if (snap.exists()) {
          const d = snap.data();
          if (d.expenses)  setExpensesRaw(d.expenses);
          if (d.wallets)   setWalletsRaw(d.wallets);
          if (d.services)  setServicesRaw(d.services);
          if (d.lenses)    setLensesRaw(d.lenses);
          if (d.purchases) setPurchasesRaw(d.purchases);
          if (d.haircuts)  setHaircutsRaw(d.haircuts);
          if (d.lensStock != null) setLensStockRaw(d.lensStock);
        }
      } catch(e) { console.error('Load error:', e); }
      setDataLoading(false);
    });
    return unsub;
  }, []);

  // Dolar Blue
  useEffect(()=>{ fetch('https://dolarapi.com/v1/dolares/blue').then(r=>r.json()).then(d=>{if(d.venta)setDolarBlue(d.venta);}).catch(()=>{}); },[]);

  const handleLogin = async () => {
    setAuthError('');
    try {
      await signInWithPopup(auth, provider);
    } catch(e) {
      setAuthError('Error al iniciar sesión. Intentá de nuevo.');
    }
  };

  const handleSignOut = async () => {
    if (confirm('¿Cerrar sesión?')) { await signOut(auth); setAuthState('unauthenticated'); }
  };

  const handleExport = () => {
    const data=JSON.stringify({expenses,wallets,services,lenses,purchases,haircuts,lensStock},null,2);
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
    a.download=`miapp-backup-${todayStr()}.json`;a.click();
  };

  const handleImport = e => {
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        const merge = confirm('¿Querés COMBINAR estos datos con los que ya tenés?\n\nAceptar = combinar (se suman, sin duplicar por id)\nCancelar = reemplazar todo lo existente');
        const mergeArr = (current, incoming) => {
          if (!incoming) return current;
          const ids = new Set(current.map(x=>x.id));
          const newOnes = incoming.filter(x=>!ids.has(x.id));
          return [...current, ...newOnes];
        };
        if (merge) {
          if(d.expenses) setExpenses(prev=>mergeArr(prev, d.expenses));
          if(d.wallets)  setWallets(prev=>mergeArr(prev, d.wallets));
          if(d.services) setServices(prev=>mergeArr(prev, d.services));
          if(d.lenses)   setLenses(prev=>mergeArr(prev, d.lenses));
          if(d.purchases) setPurchases(prev=>mergeArr(prev, d.purchases));
          if(d.haircuts) setHaircuts(prev=>mergeArr(prev, d.haircuts));
          if(d.lensStock!=null) setLensStock(d.lensStock);
        } else {
          if(d.expenses) setExpenses(d.expenses);
          if(d.wallets)  setWallets(d.wallets);
          if(d.services) setServices(d.services);
          if(d.lenses)   setLenses(d.lenses);
          if(d.purchases) setPurchases(d.purchases);
          if(d.haircuts) setHaircuts(d.haircuts);
          if(d.lensStock!=null) setLensStock(d.lensStock);
        }
        alert('✅ Datos importados');
      } catch { alert('❌ Archivo inválido'); }
    };
    reader.readAsText(file);
  };

  if (authState === 'loading') return h(LoadingScreen, { message: 'Iniciando...' });
  if (authState === 'unauthenticated') return h(LoginScreen, { onLogin: handleLogin, error: authError });
  if (dataLoading) return h(LoadingScreen, { message: 'Cargando tus datos...' });

  const TABS=[{id:'home',icon:'🏠',label:'Inicio'},{id:'finanzas',icon:'💰',label:'Finanzas'},{id:'salud',icon:'🧬',label:'Personal'},{id:'ajustes',icon:'⚙️',label:'Ajustes'}];
  const showDatePicker=tab==='finanzas';

  return h('div',{className:'min-h-screen pb-24 md:pb-0 md:pl-64'},
    // Sidebar desktop
    h('aside',{className:'fixed left-0 top-0 h-full w-64 bg-white border-r border-violet-100 hidden md:flex flex-col p-6 z-40'},
      h('div',{className:'flex items-center gap-3 mb-10'},
        h('div',{className:'w-10 h-10 rounded-2xl flex items-center justify-center text-xl text-white shadow-lg',style:{background:'linear-gradient(135deg,#4f46e5,#7c3aed)'}},'✦'),
        h('div',null,h('h1',{className:'text-base font-black text-slate-900 leading-none'},'MiApp'),h('p',{className:'text-[10px] font-black text-slate-400 uppercase tracking-widest'},'Personal'))
      ),
      h('nav',{className:'flex-1 space-y-1'},TABS.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),className:`w-full flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm transition-all ${tab===t.id?'bg-gradient-to-r from-indigo-50 to-violet-50 text-indigo-700 border border-indigo-100':'text-slate-500 hover:bg-slate-50'}`},t.icon,' ',t.label))),
      h('div',{className:'mt-4 space-y-2'},
        h('div',{className:'p-3 rounded-2xl bg-emerald-50 flex items-center gap-2'},h('div',{className:'w-2 h-2 rounded-full bg-emerald-500'}),h('p',{className:'text-[9px] font-black text-emerald-600 uppercase tracking-widest'},'Sincronizado')),
        h('p',{className:'text-[9px] font-black text-slate-400 text-center truncate'},user?.email)
      )
    ),
    // Header
    h('header',{className:'sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 px-5 py-3 flex justify-between items-center z-30'},
      h('div',null,h('h2',{className:'text-base font-black text-slate-800 leading-none'},TABS.find(t=>t.id===tab)?.label??tab),showDatePicker&&h('p',{className:'text-[10px] text-slate-400 font-black uppercase tracking-widest mt-0.5'},new Date(year,month,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'}))),
      showDatePicker&&h('div',{className:'flex gap-2'},
        h('select',{value:month,onChange:e=>setMonth(parseInt(e.target.value)),className:'text-xs bg-slate-100 rounded-xl px-3 py-2 outline-none font-black text-slate-700'},MONTHS.map((m,i)=>h('option',{key:i,value:i},m.slice(0,3).toUpperCase()))),
        h('select',{value:year,onChange:e=>setYear(parseInt(e.target.value)),className:'text-xs bg-slate-100 rounded-xl px-3 py-2 outline-none font-black text-slate-700'},[2024,2025,2026,2027,2028,2029,2030].map(y=>h('option',{key:y,value:y},y)))
      )
    ),
    // Main
    h('main',{className:'p-5 max-w-5xl mx-auto'},
      tab==='home'     && h(HomeView,{expenses,wallets,services,lenses,haircuts,lensStock,dolarBlue,currentMonth:month,currentYear:year,setTab}),
      tab==='finanzas' && h(FinanzasView,{expenses,setExpenses,wallets,setWallets,services,setServices,categories,dolarBlue,currentMonth:month,currentYear:year}),
      tab==='salud'    && h(SaludView,{lenses,setLenses,lensStock,setLensStock,purchases,setPurchases,haircuts,setHaircuts}),
      tab==='ajustes'  && h(AjustesView,{onExport:handleExport,onImport:handleImport,onSignOut:handleSignOut,userEmail:user?.email})
    ),
    // Bottom nav
    h('nav',{className:'fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-slate-100 flex md:hidden z-40'},
      TABS.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),className:`flex-1 py-3 flex flex-col items-center gap-0.5 transition-all ${tab===t.id?'text-indigo-600':'text-slate-400'}`},h('span',{className:'text-xl'},t.icon),h('span',{className:'text-[9px] font-black uppercase tracking-wide'},t.label)))
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
  </script>
